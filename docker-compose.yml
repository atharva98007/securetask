version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: securetask
      POSTGRES_PASSWORD: securetask
      POSTGRES_DB: securetask
    ports:
      - "5432:5432"
    volumes:
      - securetask_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securetask"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql://securetask:securetask@db:5432/securetask
      SECRET_KEY: CHANGE_ME_IN_PRODUCTION_super_secret_key_please_rotate
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      CORS_ORIGINS: '["*"]'
    depends_on:
      db:
        condition: service_healthy

volumes:
  securetask_pgdata:
